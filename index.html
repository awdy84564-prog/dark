<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Syria - واتساب سوريا</title>
    <style>
        /* المتغيرات الأساسية للألوان (الوضع الداكن والوضع الفاتح) */
        :root {
            --bg-main: #11141a;
            --bg-side: #181c24;
            --text-color: #f1f1f1;
            --border-color: #262c3a;
            --syria-green: #248a3d;
            --chat-bubble: #1f2533;
        }

        .light-theme {
            --bg-main: #f0f2f5;
            --bg-side: #ffffff;
            --text-color: #111111;
            --border-color: #e1e4e8;
            --syria-green: #2ea44f;
            --chat-bubble: #e2f7cb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* شاشة القفل والأمان */
        #lock-screen {
            position: fixed;
            top:0; left:0; width:100vw; height:100vh;
            background-color: #0b0d12;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .lock-box {
            background: #181c24;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--syria-green);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .lock-input {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            text-align: center;
            font-size: 18px;
            width: 150px;
            outline: none;
            margin-bottom: 15px;
        }

        /* شريط التحكم العلوي الرئيسي */
        .app-bar {
            background-color: var(--bg-side);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        /* أيقونة علم الثورة السورية المبتكرة */
        .syria-flag-icon {
            width: 45px;
            height: 30px;
            background: linear-gradient(to bottom, #248a3d 33.3%, #ffffff 33.3%, #ffffff 66.6%, #000000 66.6%);
            position: relative;
            border-radius: 3px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .flag-star {
            color: #cc0000;
            font-size: 10px;
            line-height: 0;
            margin-top: -2px;
        }
        .app-title {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* أدوات الراديو والمظهر العلوية */
        .toolbar-options {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .radio-container {
            background: rgba(0, 0, 0, 0.1);
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .radio-select {
            background: transparent;
            color: var(--text-color);
            border: none;
            outline: none;
            font-size: 13px;
            cursor: pointer;
        }
        .action-btn {
            background: var(--syria-green);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .theme-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
        }

        /* هيكل محاذاة تطبيق واتساب */
        .main-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            flex: 1;
            height: calc(100vh - 56px);
        }
        .chats-sidebar {
            background-color: var(--bg-side);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
