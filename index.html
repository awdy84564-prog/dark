<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK CHAT</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0b0c10; color: #c5c6c7; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        #login-screen { justify-content: center; align-items: center; background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%); }
        .card { background-color: #1f2833; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; }
        h1 { color: #45f3ff; margin-bottom: 25px; letter-spacing: 2px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px 15px; background-color: #0b0c10; border: 1px solid #45f3ff; border-radius: 6px; color: #fff; font-size: 16px; outline: none; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background-color: #45f3ff; border: none; border-radius: 6px; color: #0b0c10; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #1f2833; color: #45f3ff; border: 1px solid #45f3ff; }
        header { background-color: #1f2833; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #45f3ff; }
        header h2 { color: #45f3ff; font-size: 20px; }
        .mic-panel { display: flex; align-items: center; gap: 10px; }
        .btn-mic { width: auto; padding: 8px 15px; font-size: 14px; }
        .btn-mic.active { background-color: #ff4757; color: #fff; }
        #mic-status { font-size: 14px; font-weight: bold; }
        .status-off { color: #888; }
        .status-on { color: #2ed573; }
        .status-live { color: #ff4757; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg-box { background-color: #1f2833; padding: 10px 15px; border-radius: 8px; max-width: 80%; align-self: flex-start; }
        .msg-user { color: #45f3ff; font-weight: bold; font-size: 13px; margin-bottom: 3px; }
        .msg-text { color: #fff; word-break: break-word; }
        .sys-msg { align-self: center; color: #888; font-size: 12px; font-style: italic; }
        .input-area { padding: 15px; background-color: #1f2833; display: flex; gap: 10px; }
        .input-area input { margin-bottom: 0; flex: 1; }
        .input-area button { width: 80px; }
    </style>
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="card">
            <h1>DARK CHAT</h1>
            <input type="text" id="username-input" placeholder="Enter Username" maxlength="15">
            <input type="password" id="password-input" placeholder="Password (Owners Only)">
            <button id="login-btn">ENTER ROOM</button>
        </div>
    </div>
    <div id="chat-screen" class="screen hidden">
        <header>
            <h2>DARK CHAT</h2>
            <div class="mic-panel">
                <button id="mic-btn" class="btn-mic hidden">START MIC</button>
                <span id="mic-status" class="status-off">Mic is Off</span>
            </div>
        </header>
        <div id="chat-messages" class="messages-area"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." maxlength="200">
            <button id="send-btn">SEND</button>
        </div>
    </div>
    <script>
        const socket = io();
        let audioContext = null;
        let myRole = "USER";
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const usernameInput = document.getElementById('username-input');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const messagesArea = document.getElementById('chat-messages');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const micStatus = document.getElementById('mic-status');
        let isBroadcasting = false;

        loginBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (username) {
                socket.emit('join-chat', { username, password });
                loginScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
            }
        });

        sendBtn.addEventListener('click', sendMsg);
        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });

        function sendMsg() {
            const text = msgInput.value.trim();
            if (text) {
                socket.emit('send-msg', { text });
                msgInput.value = '';
            }
        }

        socket.on('role-assigned', (data) => {
            myRole = data.role;
            if (myRole === "OWNER") { micBtn.classList.remove('hidden'); }
        });

        socket.on('sys-message', (text) => {
            const div = document.createElement('div');
            div.className = 'sys-msg';
            div.innerText = text;
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });

        socket.on('new-msg', (data) => {
            const div = document.createElement('div');
            div.className = 'msg-box';
            const prefix = data.role === "OWNER" ? "👑 " : "";
            div.innerHTML = `<div class="msg-user">${prefix}${data.user}</div><div class="msg-text">${data.text}</div>`;
            messagesArea.appendChild(div);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });

        micBtn.addEventListener('click', async () => {
            if (myRole !== "OWNER") return;
            if (!isBroadcasting) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    socket.emit('start-mic');
                    isBroadcasting = true;
                    micBtn.innerText = 'STOP MIC';
                    micBtn.classList.add('active');
                    micStatus.innerText = 'You are Live';
                    micStatus.className = 'status-live';
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContext.createMediaStreamSource(stream);
                    const processor = audioContext.createScriptProcessor(4096, 1, 1);
                    source.connect(processor);
                    processor.connect(audioContext.destination);
                    processor.onaudioprocess = (e) => {
                        if (!isBroadcasting) return;
                        const inputData = e.inputBuffer.getChannelData(0);
                        socket.emit('audio-data', inputData);
                    };
                    window.localStream = stream;
                    window.processor = processor;
                } catch (err) {}
            } else {
                stopLocalMic();
                socket.emit('stop-mic');
            }
        });

        function stopLocalMic() {
            isBroadcasting = false;
            micBtn.innerText = 'START MIC';
            micBtn.classList.remove('active');
            micStatus.innerText = 'Mic is Off';
            micStatus.className = 'status-off';
            if (window.localStream) { window.localStream.getTracks().forEach(track => track.stop()); }
            if (window.processor) window.processor.disconnect();
            if (audioContext) audioContext.close();
        }

        socket.on('mic-started', () => {
            if (!isBroadcasting) {
                micStatus.innerText = '👑 Owner is Speaking...';
                micStatus.className = 'status-on';
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        });

        socket.on('mic-stopped', () => {
            if (!isBroadcasting) {
                micStatus.innerText = 'Mic is Off';
                micStatus.className = 'status-off';
                if (audioContext) audioContext.close();
            }
        });

        socket.on('audio-stream', (data) => {
            if (isBroadcasting || !audioContext) return;
            const buffer = audioContext.createBuffer(1, data.length, audioContext.sampleRate);
            buffer.getChannelData(0).set(data);
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start();
        });

        socket.on('init-state', (state) => {
            if (state.hasBroadcaster && !isBroadcasting) {
                micStatus.innerText = '👑 Owner is Speaking...';
                micStatus.className = 'status-on';
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        });
    </script>
</body>
</html>
